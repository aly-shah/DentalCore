name: CI

# Runs on pull requests targeting main and on pushes to any non-main branch.
# main itself is built+shipped by deploy.yml; gate merges into main by making
# this workflow a required status check in the repo's branch-protection rules.
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # A throwaway Postgres so `prisma db push` and `next build` run against a
    # real database (matching production), not SQLite.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: dentacore_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:ci@localhost:5432/dentacore_ci
      # Not a real secret — auth.ts throws at import without one, and the
      # build/tests need to load that module. Never used to sign live tokens.
      AUTH_SECRET: ci-not-a-real-secret-ci-not-a-real-secret-0123
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync schema to the CI database
        run: npx prisma db push --skip-generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
