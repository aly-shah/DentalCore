name: Desktop (Windows installer)

# Builds the offline Windows desktop app (.exe installer) and publishes it to a
# GitHub Release you can download. Run it from the Actions tab → "Run workflow".
on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

concurrency:
  group: desktop-build
  cancel-in-progress: true

jobs:
  build:
    name: Build installer on Windows
    runs-on: windows-latest
    timeout-minutes: 40

    # Placeholder build-time values — some routes read these at import while
    # Next collects page data. The REAL secret is generated per-install at
    # runtime; these never sign live tokens.
    env:
      DATABASE_URL: postgresql://postgres:ci@localhost:5432/dentacore_ci
      AUTH_SECRET: ci-not-a-real-secret-ci-not-a-real-secret-0123
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Generate Prisma client (with Windows engine)
        run: npx prisma generate

      - name: Build Next.js (standalone, offline)
        env:
          BUILD_STANDALONE: "1"
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Assemble standalone bundle
        run: npm run desktop:assemble

      - name: Build seeded Postgres template (schema + mock data)
        run: npm run desktop:pgdata

      - name: Package Windows installer
        run: npm run desktop:dist

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DentaCore-Windows-Installer
          path: dist/*.exe
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: DentaCore Desktop (latest)
          body: |
            Offline Windows desktop build of DentaCore with demo/mock data.

            **Download:** `DentaCore-Setup-*.exe` below, then double-click to install.
            Works fully offline. Demo login: `admin@dentacore.com` / `password`.
          files: dist/*.exe
          fail_on_unmatched_files: true
