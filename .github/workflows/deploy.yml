name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to scalamedic VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Decode SSH key
        id: ssh
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY_B64" ]; then
            echo "::error::SSH_PRIVATE_KEY_B64 secret is not set"
            exit 1
          fi
          install -d -m 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/ci_deploy
          chmod 600 ~/.ssh/ci_deploy
          ssh-keygen -lf ~/.ssh/ci_deploy
          echo "key_path=$HOME/.ssh/ci_deploy" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: ${{ steps.ssh.outputs.key_path }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail

            APP_DIR="/var/www/dentacore/current"
            PM2_NAME="dentacore"

            echo ">>> Deploying to $APP_DIR (pm2: $PM2_NAME)"
            cd "$APP_DIR"

            echo ">>> git fetch + reset"
            git fetch --all --prune
            git reset --hard origin/main

            echo ">>> npm ci"
            npm ci --legacy-peer-deps --no-audit --no-fund

            echo ">>> prisma generate + db push"
            npx prisma generate
            npx prisma db push --skip-generate

            echo ">>> next build"
            npm run build

            echo ">>> pm2 reload (zero-downtime)"
            pm2 reload "$PM2_NAME" --update-env
            pm2 save

            echo ">>> done"
