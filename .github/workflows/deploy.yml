name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to scalamedic VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Decode SSH key
        id: ssh
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY_B64" ]; then
            echo "::error::SSH_PRIVATE_KEY_B64 secret is not set"
            exit 1
          fi
          install -d -m 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/ci_deploy
          chmod 600 ~/.ssh/ci_deploy
          ssh-keygen -lf ~/.ssh/ci_deploy
          echo "key_path=$HOME/.ssh/ci_deploy" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: ${{ steps.ssh.outputs.key_path }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail

            APP_DIR="/var/www/dentacore/current"
            PM2_NAME="dentacore"

            echo ">>> Deploying to $APP_DIR (pm2: $PM2_NAME)"
            cd "$APP_DIR"

            echo ">>> git fetch + reset"
            git fetch --all --prune
            git reset --hard origin/main

            # The 4GB VPS has no swap headroom and was OOM-killing `npm ci`
            # (exit 137). Ensure a 2G swapfile + free stray build memory so
            # install/build survive. Uses `sudo -n` so it skips cleanly when
            # the deploy user lacks passwordless sudo; never fails the deploy.
            echo ">>> ensure swap + free memory"
            if ! sudo -n swapon --show 2>/dev/null | grep -q '/swapfile'; then
              { sudo -n fallocate -l 2G /swapfile 2>/dev/null || sudo -n dd if=/dev/zero of=/swapfile bs=1M count=2048 2>/dev/null; } \
                && sudo -n chmod 600 /swapfile && sudo -n mkswap /swapfile && sudo -n swapon /swapfile \
                && { grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' | sudo -n tee -a /etc/fstab >/dev/null; } \
                && echo "(swap enabled)" \
                || echo "(swap setup skipped — needs a swapfile or passwordless sudo on the VPS)"
            fi
            pkill -9 -f 'next build' 2>/dev/null || true
            free -h || true

            echo ">>> npm ci"
            npm ci --legacy-peer-deps --no-audit --no-fund

            echo ">>> prisma generate"
            npx prisma generate

            # One-time baseline: tell Prisma that the existing schema
            # (previously applied via db push) is "already applied".
            # Idempotent after the first run — re-running errors out
            # silently, which we swallow with || true.
            echo ">>> prisma migrate baseline (idempotent)"
            npx prisma migrate resolve --applied 20260514000000_baseline 2>/dev/null || true

            echo ">>> prisma migrate deploy"
            npx prisma migrate deploy

            echo ">>> tenant backfill (idempotent)"
            npx tsx prisma/backfill-tenant.ts || echo "(backfill skipped — non-fatal)"

            echo ">>> voice-note notification backfill (idempotent)"
            npx tsx prisma/backfill-voice-note-notifications.ts || echo "(vn-notif backfill skipped — non-fatal)"

            echo ">>> next build (cap heap to survive on the small VPS)"
            NODE_OPTIONS=--max-old-space-size=2048 npm run build

            echo ">>> pm2 reload (zero-downtime)"
            pm2 reload "$PM2_NAME" --update-env
            pm2 save

            echo ">>> done"
