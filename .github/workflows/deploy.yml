name: Deploy

# Build the app on the GitHub runner (clean, fast, no contention) and ship
# the finished .next + node_modules to the VPS via rsync. The box only runs
# migrations + pm2 reload — it never runs npm ci / next build, so deploys no
# longer compete with the other apps on the shared VPS for CPU/RAM.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build in CI + ship to scalamedic VPS
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Build-time placeholders so module-load doesn't throw while Next collects
    # page data (some routes read these at import). The REAL values live only
    # in the VPS .env and are used at runtime — never these.
    env:
      DATABASE_URL: postgresql://postgres:ci@localhost:5432/dentacore_ci
      AUTH_SECRET: ci-not-a-real-secret-ci-not-a-real-secret-0123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"   # match the VPS runtime for native-module compat

      - name: Install deps
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: NODE_OPTIONS=--max-old-space-size=4096 npm run build

      - name: Decode SSH key
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY_B64" ]; then
            echo "::error::SSH_PRIVATE_KEY_B64 secret is not set"; exit 1
          fi
          install -d -m 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/ci_deploy
          chmod 600 ~/.ssh/ci_deploy

      - name: Ship build artifacts to the VPS
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          PORT: ${{ secrets.SSH_PORT }}
        run: |
          SSH="ssh -i ~/.ssh/ci_deploy -p ${PORT:-22} -o StrictHostKeyChecking=accept-new"
          DEST="$USER@$HOST:/var/www/dentacore/current"
          # node_modules first (delta), then .next without the build cache
          rsync -az --delete -e "$SSH" node_modules/ "$DEST/node_modules/"
          rsync -az --delete --exclude='/cache/' -e "$SSH" .next/ "$DEST/.next/"

      - name: Migrate + reload on the VPS
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          PORT: ${{ secrets.SSH_PORT }}
          SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/ci_deploy -p "${PORT:-22}" -o StrictHostKeyChecking=accept-new "$USER@$HOST" "SHA=$SHA bash -se" <<'REMOTE'
          set -euo pipefail
          cd /var/www/dentacore/current

          echo ">>> sync source to the built commit"
          git fetch --all --prune
          git reset --hard "$SHA"   # matches the artifacts CI just shipped

          echo ">>> ensure uploads symlink (persistent media dir nginx serves)"
          mkdir -p /var/www/dentacore/uploads
          if [ ! -L public/uploads ]; then
            [ -d public/uploads ] && find public/uploads -mindepth 1 -maxdepth 1 -exec mv -t /var/www/dentacore/uploads/ {} + 2>/dev/null || true
            rm -rf public/uploads
            ln -s /var/www/dentacore/uploads public/uploads
          fi

          echo ">>> prisma migrate"
          npx prisma migrate resolve --applied 20260514000000_baseline 2>/dev/null || true
          npx prisma migrate deploy

          echo ">>> backfills (idempotent)"
          npx tsx prisma/backfill-tenant.ts || echo "(tenant backfill skipped — non-fatal)"
          npx tsx prisma/backfill-voice-note-notifications.ts || echo "(vn-notif backfill skipped — non-fatal)"

          echo ">>> pm2 reload (zero-downtime)"
          pm2 reload dentacore --update-env
          pm2 save
          echo ">>> done"
          REMOTE

      - name: Verify
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -m 15 -w '%{http_code}' https://dental.scalamedic.com/api/health || true)
            echo "health=$code"; [ "$code" = "200" ] && exit 0; sleep 5
          done
          echo "::warning::health check did not return 200"
